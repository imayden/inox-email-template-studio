<!-- 通用组件集中在本文件；构建脚本会按 data-component 和 data-language 选择内容。 -->

<template data-component="app-promo" data-language="zh">

  <table class="promo-table" border="0" cellspacing="0" cellpadding="0" width="100%" role="presentation">
    <tr>
      <td class="promo-icon-cell" valign="top" width="78">
        <img class="promo-icon" data-asset-src="appIcon" alt="INOX Smart App" width="72" height="72" />
      </td>
      <td class="promo-copy-cell" valign="top">
        <p class="promo-title">使用 INOX Smart App 管理访问权限。</p>
        <p class="promo-lead">获取更安全、更便捷的门禁体验。</p>
        <p class="promo-note">可在 App Store 和 Google Play 下载。</p>
      </td>
    </tr>
  </table>
</template>

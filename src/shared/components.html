<template data-component="app-promo" data-language="zh">
  <div class="shared-divider"></div>
  <table class="promo-table" border="0" cellspacing="0" cellpadding="0" width="100%" role="presentation">

        <p class="promo-lead">下载 INOX Smart App，轻松管理门禁。</p>

      <td class="promo-badges-cell" valign="middle" width="100">
        <a class="promo-badge-link" data-asset-href="appStoreUrl" target="_blank" rel="noopener noreferrer"><img class="promo-store-badge" data-asset-src="appStoreBadge" alt="在 App Store 下载" width="100" /></a>

</template>

<template data-language="zh">
<!-- @subject INOX Smart 收到邀请 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">
                收到邀请
              </h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;">
                <strong>${userName}，您好：</strong>
              </p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">
                我们已在 INOX Smart App 平台为您创建专属账户。诚挚邀请您完成账户注册流程，以便顺利加入以下房间/空间：
              </p>
              <table border="0" cellspacing="0" cellpadding="0" width="100%">
                <tr>
                  <td align="center">
                    <span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">
                      ${code}
                    </span>
                  </td>
                </tr>
              </table>
              <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
              <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;">
                <strong>邀请人：</strong> ${inviterName}(${email})<br />
                <strong>物业：</strong> ${propertyName}<br />
                <strong>单元：</strong> ${unitName}<br />
                <strong>验证码有效期：</strong> ${startTime} &mdash; ${endTime}
              </p>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">
                如果您愿意接受邀请，请在App Store / Google Play中搜索并下载Inox Smart，并在 48 小时内输入验证码完成验证。如果这不是您的邮箱，请忽略此邮件。
              </p>
</template>

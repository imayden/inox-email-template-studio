<template data-language="zh">
<!-- @subject INOX Smart 许可证即将到期通知 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">许可证即将到期通知</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${property_manager_name}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您的 INOX Smart SaaS License 即将到期，且当前未开启自动续费。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>License 到期详情：</strong><br />- License 套餐：${license_type}<br />- 到期日期：${license_expire_date}<br />- 物业经理：${manager_name}，${manager_email}<br />- 账单联系人：${contact_name}，${contact_email}<br /><strong>当前容量：</strong><br />- 设备：${device_total}<br />- 移动端账号：${user_total}<br />- 数字钥匙：${ekey_total}<br />- SaaS 登录账号：${saas_total}<br />- 物业：${property_total}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">为避免服务中断，请在到期日前联系您的 Partner 完成续费。<br />如果未在到期日前完成续费，SaaS License 可能会被暂停。<br /><br />Best,<br />INOX Smart Team</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart License Expiration Notice -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Notice of license expiration</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hi ${property_manager_name},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Your INOX Smart SaaS license is approaching its expiration date, and auto-renewal is currently not enabled.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>License Expiration Details:</strong><br />- License Plan: ${license_type}<br />- Expiration Date: ${license_expire_date}<br />- Property Manager: ${manager_name}, ${manager_email}<br />- Billing Contact: ${contact_name}, ${contact_email}<br /><strong>Current Capacity:</strong><br />- Devices: ${device_total}<br />- Mobile Accounts: ${user_total}<br />- E-Keys: ${ekey_total}<br />- SaaS Logins: ${saas_total}<br />- Properties: ${property_total}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">To avoid service interruption, please contact your Partner to complete the renewal before the expiration date.<br />If renewal is not completed by the expiration date, the SaaS license may be suspended.<br /><br />Best,<br />INOX Smart Team</div>
</template>

<template data-language="es">

              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Detalles de expiración de la licencia:</strong><br />- Plan de licencia: ${license_type}<br />- Fecha de expiración: ${license_expire_date}<br />- Administrador de la propiedad: ${manager_name}, ${manager_email}<br />- Contacto de facturación: ${contact_name}, ${contact_email}<br /><strong>Capacidad actual:</strong><br />- Dispositivos: ${device_total}<br />- Cuentas móviles: ${user_total}<br />- E-Keys: ${ekey_total}<br />- Inicios de sesión SaaS: ${saas_total}<br />- Propiedades: ${property_total}</div>

              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Para evitar interrupciones del servicio, contacte a su partner antes de la fecha de expiración para completar la renovación.<br />Si la renovación no se completa antes de la fecha de expiración, la licencia SaaS podrá ser suspendida.<br /><br />Saludos,<br />Equipo de INOX Smart</div>

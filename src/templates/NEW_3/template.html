<template data-language="zh">
<!-- @subject INOX Smart 许可证即将到期通知 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">您的许可证即将到期</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${property_manager_name}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您的 INOX Smart SaaS 许可证即将到期，且当前未开启自动续订。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>许可证到期详情：</strong><br />- 许可证计划：${license_type}<br />- 到期日期：${license_expire_date}<br />- 物业经理：${manager_name}，<a href="mailto:${manager_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${manager_email}</a><br />- 账单联系人：${contact_name}，<a href="mailto:${contact_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${contact_email}</a><br /><strong>当前容量：</strong><br />- 设备：${device_total}<br />- 移动端账户：${user_total}<br />- E-key：${ekey_total}<br />- SaaS 登录账户：${saas_total}<br />- 物业：${property_total}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">为避免服务中断，请在到期日前联系您的 INOX Smart 合作伙伴完成续订。<br />如未及时续订，INOX Smart SaaS 访问权限可能会被暂停。<br /><br />此致，<br />INOX Smart 团队</div>
</template>

<template data-language="en">

<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Your license expires soon</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hi ${property_manager_name},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Your INOX Smart SaaS license will expire soon, and auto-renewal is not enabled.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>License Expiration Details:</strong><br />- License Plan: ${license_type}<br />- Expiration Date: ${license_expire_date}<br />- Property Manager: ${manager_name}, <a href="mailto:${manager_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${manager_email}</a><br />- Billing Contact: ${contact_name}, <a href="mailto:${contact_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${contact_email}</a><br /><strong>Current Capacity:</strong><br />- Devices: ${device_total}<br />- Mobile Accounts: ${user_total}<br />- E-Keys: ${ekey_total}<br />- SaaS Logins: ${saas_total}<br />- Properties: ${property_total}</div>

</template>

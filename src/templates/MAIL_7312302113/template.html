<template data-language="zh">
<!-- @subject INOX Smart 单元所有者验证 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">有人邀请您成为单元所有者</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">有人正在邀请您成为新的单元所有者。</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>邀请人：</strong> ${inviterName}(${email})<br /><strong>物业：</strong> ${propertyName}<br /><strong>单元：</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请联系 ${inviterName}，并在 10 分钟内提供验证码以完成验证流程。如果这封邮件并非发给您，请忽略。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Unit Owner Verification -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Someone invite you to be an owner of a unit</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Someone is inviting you to become the new unit owner.</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Inviter:</strong> ${inviterName}(${email})<br /><strong>Property:</strong> ${propertyName}<br /><strong>Units:</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please contact ${inviterName} and provide the verification code within 10 minutes to complete the verification process. If this email is not intended for you, please disregard.</p>
</template>

          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>

          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>

<template data-language="zh">
<!-- @subject INOX Smart 单元所有者邀请验证 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">验证您的单元所有者邀请</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您受邀成为以下单元的新所有者。</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>邀请人：</strong> ${inviterName}(${email})<br /><strong>物业：</strong> ${propertyName}<br /><strong>单元：</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请在 10 分钟内将此验证码提供给 ${inviterName}，以便其完成邀请流程。如果您不是此邮件的预期收件人，请忽略此邮件。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Unit Owner Invitation Verification -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Verify your unit owner invitation</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">You have been invited to become the new owner of the following unit(s).</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Inviter:</strong> ${inviterName}(${email})<br /><strong>Property:</strong> ${propertyName}<br /><strong>Units:</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please provide this verification code to ${inviterName} within 10 minutes so they can complete the invitation process. If you are not the intended recipient of this email, please disregard it.</p>
</template>

<template data-language="es">
<!-- @subject INOX Smart Verificación de invitación para propietario de unidad -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Verifica tu invitación para ser propietario de una unidad</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Has recibido una invitación para ser el nuevo propietario de las siguientes unidades.</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Invitador:</strong> ${inviterName}(${email})<br /><strong>Propiedad:</strong> ${propertyName}<br /><strong>Unidades:</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Proporciona este código de verificación a ${inviterName} en un plazo de 10 minutos para que pueda completar la invitación. Si no eres la persona destinataria de este correo, ignóralo.</p>
</template>

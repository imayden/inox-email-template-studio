<template data-language="zh">
<!-- @subject INOX Smart 发起单元转让 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">已发起单元转让</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您已在 INOX Smart App 中发起单元转让操作，具体项目信息如下。</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>物业：</strong> ${propertyName}<br /><strong>待转让单元：</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">此验证码已发送至您的注册邮箱，用于验证本次转让是否由您本人发起。请在 10 分钟内输入验证码完成流程。如果这封邮件并非发给您，请忽略。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Unit Transfer Initiated -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Unit transfer initiated</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">You initiated a unit transfer operation in the INOX Smart App, and the specific project information is as follows.</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Property:</strong> ${propertyName}<br /><strong>Units to be transferred:</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">This code is sent to your registered email to verify that this transfer was initiated by you. Please enter the verification code within 10 minutes to complete the process. If this email is not intended for you, please disregard.</p>
</template>

<template data-language="es">

          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Has iniciado una operación de transferencia de unidad en la app INOX Smart, y la información específica del proyecto es la siguiente.</p>
          <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
          <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>

          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Este código se envía a tu correo registrado para verificar que esta transferencia fue iniciada por ti. Ingresa el código de verificación dentro de 10 minutos para completar el proceso. Si este correo no es para ti, ignóralo.</p>

<template data-language="zh">
<!-- @subject INOX Smart 强制开门警报 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">强制开门警报</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">系统检测到某扇门被强行打开。以下是该强行开门事件的相关信息。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>物业：</strong> ${propertyName}<br /><strong>单元：</strong> ${unitName}<br /><strong>设备：</strong> ${deviceName}<br /><strong>设备 ID：</strong> ${deviceID}<br /><strong>强制开门时间：</strong> ${time}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请立即核查此活动。<br />如果这封邮件并非发给您，请忽略。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart Forced Open Alert -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Forced Open Alert</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">The system has detected that a door has been forcibly opened. The following is the relevant information of the forcibly opened door.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Property:</strong> ${propertyName}<br /><strong>Unit:</strong> ${unitName}<br /><strong>Device:</strong> ${deviceName}<br /><strong>Device ID:</strong> ${deviceID}<br /><strong>Forced opening time:</strong> ${time}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please verify this activity immediately.<br />If this email is not intended for you, please disregard.</div>
</template>

<template data-language="es">
<!-- @subject INOX Smart Alerta de apertura forzada -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Alerta de apertura forzada</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">El sistema ha detectado que una puerta fue abierta por la fuerza. A continuacion se muestra la informacion relevante de la puerta afectada.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Propiedad:</strong> ${propertyName}<br /><strong>Unidad:</strong> ${unitName}<br /><strong>Dispositivo:</strong> ${deviceName}<br /><strong>ID del dispositivo:</strong> ${deviceID}<br /><strong>Hora de apertura forzada:</strong> ${time}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Verifica esta actividad de inmediato.<br />Si este correo no es para ti, ignóralo.</div>
</template>

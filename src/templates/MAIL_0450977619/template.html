<template data-language="zh">
<!-- @subject INOX Smart 强制开门警报 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">强制开门警报</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">系统检测到门被强行打开，事件详情如下。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>物业：</strong> ${propertyName}<br /><strong>单元：</strong> ${unitName}<br /><strong>设备：</strong> ${deviceName}<br /><strong>设备 ID：</strong> ${deviceID}<br /><strong>检测时间：</strong> ${time}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请立即核查此事件。<br />如果您不是此邮件的预期收件人，请忽略此邮件。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart Forced-Entry Alert -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Forced-entry alert</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">The system detected that a door was forced open. Event details are shown below.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Property:</strong> ${propertyName}<br /><strong>Unit:</strong> ${unitName}<br /><strong>Device:</strong> ${deviceName}<br /><strong>Device ID:</strong> ${deviceID}<br /><strong>Detected Time:</strong> ${time}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please investigate this event immediately.<br />If you are not the intended recipient of this email, please disregard it.</div>
</template>

<template data-language="es">
<!-- @subject INOX Smart Alerta de apertura forzada -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Alerta de apertura forzada</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">El sistema detectó que una puerta fue abierta por la fuerza. Los detalles del evento se muestran a continuación.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Propiedad:</strong> ${propertyName}<br /><strong>Unidad:</strong> ${unitName}<br /><strong>Dispositivo:</strong> ${deviceName}<br /><strong>ID del dispositivo:</strong> ${deviceID}<br /><strong>Hora de detección:</strong> ${time}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Investiga este evento de inmediato.<br />Si no eres la persona destinataria de este correo, ignóralo.</div>
</template>

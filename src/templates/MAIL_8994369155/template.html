<template data-language="zh">
<!-- @subject INOX Smart E-key 创建通知 -->
<!-- Header -->
              <h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">
                创建 E-key
              </h1>

              <!-- Greeting & intro -->
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;">
                <strong>${userName}，您好：</strong>
              </p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">
                您有一个新的 E-key，请查看。
              </p>

              <!-- Details -->
              <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;">
                <strong>创建人：</strong> ${inviterName}(${email})<br />
                <strong>E-key 类型：</strong> ${ekey}<br />
                <strong>物业：</strong> ${propertyName}<br />
                <strong>可访问单元和设备：</strong> ${unitName}(${deviceName})
              </p>

              <!-- Spacer -->
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>

              <!-- Instructions -->
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7;">
                如果您需要帮助处理此问题，我们的支持团队可为您提供协助，请访问
                <a href="https://inoxsmart.com/support" style="color:#333333; font-weight:bold; text-decoration:none;">inoxsmart.com/support</a>，
                或致电 <strong>(888) 998-1577</strong>。感谢您使用 INOX Smart！
              </p>

              <!-- Divider -->
</template>

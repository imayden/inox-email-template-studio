<template data-language="zh">
<!-- @subject INOX Smart 联系通知 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">有住户想联系您</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">有人想通过 INOX Smart App 联系您。</p>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>联系人：</strong> ${contactName}(${email})<br /><strong>联系人所属物业：</strong> ${propertyName}<br /><strong>联系人所属单元：</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">如需更多详情或帮助，请访问 inoxsmart.com/support。感谢您使用 INOX Smart！<br />如果这不是您的邮箱，请忽略此邮件。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Contact Notification -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">A resident wants to contact you</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Someone wants to contact you through the INOX Smart App.</p>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Contact:</strong> ${contactName}(${email})<br /><strong>Property of the Contact Person:</strong> ${propertyName}<br /><strong>Unit of the Contact Person:</strong> ${unitName}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">For more details or assistance, please visit inoxsmart.com/support. Thanks for using INOX Smart!<br />If this is not your email, please ignore it.</p>
</template>

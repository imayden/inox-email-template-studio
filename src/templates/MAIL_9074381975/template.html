<template data-language="zh">
    <!-- @subject INOX Smart 访问密码已创建 -->
    <h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">访问密码已创建！</h1>
    <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
    <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">我们已为您创建一个用户自定义的访问密码，可用于解锁配备键盘的 INOX Smart Lock/Access
        设备。</p>
    <table border="0" cellspacing="0" cellpadding="0" width="100%">
        <tr>
            <td align="center"><span
                    style="display:inline-block; padding:10px 14px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span>
            </td>
        </tr>
    </table>
    <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
    <p style="margin:0; font-size:14px; line-height:1.8;"><strong>创建人：</strong>
        ${inviterName}(<a href="mailto:${email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${email}</a>)<br /><strong>物业：</strong> ${propertyName}<br /><strong>已授权单元与设备:</strong><span class="access-scope-list" data-access-scope-list><span class="access-scope-row" data-access-scope-row><span class="access-scope-bullet">•</span><span class="access-scope-unit" data-access-scope-unit>${unitName}:</span><span class="access-device-tags" data-access-device-tags><span class="access-device-tag" data-access-device-tag>${deviceName}</span></span></span></span><strong>有效时段：</strong> ${startTime} &mdash; ${endTime}</p>
    <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
    <p style="margin:0 0 16px 0; font-size:14px; line-height:1.6;">请在上述有效期内（如适用），在上方所列任一已授权设备的键盘上输入此访问密码。</p>
    <p style="margin:0 0 16px 0; font-size:14px; line-height:1.6;">此用户自定义访问密码由“创建人”所列人员设置。如需修改、删除或申请新的访问密码，请联系该人员或管理员。</p>
    <p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">如果您并非本邮件的预期收件人，请忽略此邮件。</p>
</template>

<template data-language="en">
    <!-- @subject INOX Smart Passcode Created -->
    <h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Passcode created!
    </h1>
    <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
    <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">We have created a User-Defined Passcode for you,
        which you can use to unlock the INOX Smart Lock/Access device equipped with a keypad.</p>
    <table border="0" cellspacing="0" cellpadding="0" width="100%">
        <tr>
            <td align="center"><span
                    style="display:inline-block; padding:10px 14px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span>
            </td>
        </tr>
    </table>
    <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
    <p style="margin:0; font-size:14px; line-height:1.8;"><strong>Created By:</strong>
        ${inviterName}(<a href="mailto:${email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${email}</a>)<br /><strong>Property:</strong> ${propertyName}<br /><strong>Authorized Units &amp; Devices:</strong><span class="access-scope-list" data-access-scope-list><span class="access-scope-row" data-access-scope-row><span class="access-scope-bullet">•</span><span class="access-scope-unit" data-access-scope-unit>${unitName}:</span><span class="access-device-tags" data-access-device-tags><span class="access-device-tag" data-access-device-tag>${deviceName}</span></span></span></span><strong>Validity Period:</strong> ${startTime} &mdash;
        ${endTime}</p>
    <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
    <p style="margin:0 0 16px 0; font-size:14px; line-height:1.6;">Please enter this passcode on the keypad of any authorized device listed above during the validity period shown above, if applicable.</p>
    <p style="margin:0 0 16px 0; font-size:14px; line-height:1.6;">This User-Defined Passcode was set by the person listed under Created By. To modify or delete it, or request a new passcode, please contact that person or an administrator.</p>
    <p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">If you are not the intended recipient of this email, please disregard it.</p>
</template>

<template data-language="es">
    <!-- @subject INOX Smart Código de acceso creado -->
    <h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">¡Código de acceso
        creado!</h1>
    <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
    <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">Hemos creado para ti un código de acceso definido por
        el usuario, que puedes usar para desbloquear un dispositivo INOX Smart Lock/Access equipado con teclado.</p>
    <table border="0" cellspacing="0" cellpadding="0" width="100%">
        <tr>
            <td align="center"><span
                    style="display:inline-block; padding:10px 14px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span>
            </td>
        </tr>
    </table>
    <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
    <p style="margin:0; font-size:14px; line-height:1.8;"><strong>Creado por:</strong>
        ${inviterName}(<a href="mailto:${email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${email}</a>)<br /><strong>Propiedad:</strong> ${propertyName}<br /><strong>Unidades y dispositivos autorizados:</strong><span class="access-scope-list" data-access-scope-list><span class="access-scope-row" data-access-scope-row><span class="access-scope-bullet">•</span><span class="access-scope-unit" data-access-scope-unit>${unitName}:</span><span class="access-device-tags" data-access-device-tags><span class="access-device-tag" data-access-device-tag>${deviceName}</span></span></span></span><strong>Periodo de validez:</strong> ${startTime} &mdash;
        ${endTime}</p>
    <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
    <p style="margin:0 0 16px 0; font-size:14px; line-height:1.6;">Introduce este código de acceso en el teclado de cualquiera de los dispositivos autorizados indicados arriba durante el período de validez indicado, si corresponde.</p>
    <p style="margin:0 0 16px 0; font-size:14px; line-height:1.6;">Este Código de acceso definido por el usuario fue establecido por la persona indicada en Creado por. Para modificarlo, eliminarlo o solicitar uno nuevo, ponte en contacto con esa persona o con un administrador.</p>
    <p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">Si no eres el destinatario previsto de este correo, ignóralo.</p>
</template>

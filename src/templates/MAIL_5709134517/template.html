<template data-language="zh">

<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">验证您的物业经理邀请</h1><p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p><p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您受邀成为以下物业的物业经理。</p><table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table><div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div><p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>邀请人：</strong> ${inviterName}(<a href="mailto:${email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${email}</a>)<br /><strong>物业：</strong> ${propertyName}</p><div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div><p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">${userName} 的验证码有效期为 10 分钟。请使用此验证码完成邀请流程。如果您不是此邮件的预期收件人，请忽略此邮件。</p>
</template>

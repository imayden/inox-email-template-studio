<template data-language="zh">
<!-- @subject INOX Smart 许可证报价申请 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">许可证报价申请</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>订阅变更与报价申请</strong><br />已为此许可证订阅申请以下变更。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>计划摘要：</strong><br />- 申请的计划：${plan_name}<br />- 生效日期：${effective_date}（注：如果任何容量调整值为负数，相应的容量减少将在下一个续订日生效）<br /><strong>容量详情：</strong>请参阅随附的 PDF 文件。<br /><strong>联系方式：</strong><br />- 申请人：${requester_name}，${requester_email}<br />- 物业经理/业主：${manager_name}，${manager_email}<br />- 账单联系人：${contact_name}，${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请生成相应的报价，并将其发送给上述账单联系人。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart License Quote Request -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">License quote request</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>Subscription Change &amp; Quote Request</strong><br />The following changes have been requested for this license subscription.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Plan Summary:</strong><br />- Requested Plan: ${plan_name}<br />- Effective Date: ${effective_date} (Note: If any requested capacity change is negative, that reduction will take effect on the next renewal date)<br /><strong>Capacity Details:</strong> See the attached PDF.<br /><strong>Contact Information:</strong><br />- Requester: ${requester_name}, ${requester_email}<br />- Property Manager/Owner: ${manager_name}, ${manager_email}<br />- Billing Contact: ${contact_name}, ${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please generate the corresponding quote and send it to the Billing Contact listed above.</div>
</template>

<template data-language="es">
<!-- @subject INOX Smart Solicitud de cotización de licencia -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Solicitud de cotización de licencia</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>Solicitud de cambio de suscripción y cotización</strong><br />Se han solicitado los siguientes cambios para esta suscripción de licencia.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Resumen del plan:</strong><br />- Plan solicitado: ${plan_name}<br />- Fecha de entrada en vigor: ${effective_date} (Nota: Si algún cambio de capacidad solicitado es negativo, la reducción entrará en vigor en la próxima fecha de renovación)<br /><strong>Detalles de capacidad:</strong> consulte el archivo PDF adjunto.<br /><strong>Información de contacto:</strong><br />- Solicitante: ${requester_name}, ${requester_email}<br />- Gerente de la propiedad/Propietario: ${manager_name}, ${manager_email}<br />- Contacto de facturación: ${contact_name}, ${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Por favor, genere la cotización correspondiente y envíela al contacto de facturación indicado anteriormente.</div>
</template>

<template data-language="zh">
<!-- @subject INOX Smart 获取授权正式报价 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">获取许可证的正式报价</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>订阅修改与报价请求</strong><br />已为您的许可订阅计划申请了以下修改。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>计划摘要：</strong><br />- 请求的计划：${plan_name}<br />- 生效日期：${effective_date}（注：如果任何“附加”值小于 0，则此变更将在下一个续约日期生效）<br /><strong>容量明细：</strong>请参阅随附的 PDF 文件。<br /><strong>联系方式：</strong><br />- 请求者：${requester_name}，${requester_email}<br />- 物业经理/业主：${manager_name}，${manager_email}<br />- 账单联系人：${contact_name}，${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请生成相应的报价，并将其发送给上述账单联系人。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart License Quote Request -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Obtain the official quotation for the license</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>Subscription Modification &amp; Quote Request</strong><br />The following modifications have been requested for your license subscription plan.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Plan Summary:</strong><br />- Requested Plan: ${plan_name}<br />- Effective Date: ${effective_date} (Note: If any &quot;Additional&quot; value is &lt; 0, this change takes effect on the next Renewal Date)<br /><strong>Capacity Breakdown:</strong> Please see the PDF attached.<br /><strong>Contact Information:</strong><br />- Requester: ${requester_name}, ${requester_email}<br />- Property Manager/Owner: ${manager_name}, ${manager_email}<br />- Billing Contact: ${contact_name}, ${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please generate the corresponding quote and send it to the Billing Contact listed above.</div>
</template>

<template data-language="es">
<!-- @subject INOX Smart Cotización oficial de licencia -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Obtener la cotización oficial de la licencia</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>Modificacion de Suscripción &amp; Solicitud de Cotización</strong><br />Se han solicitado las siguientes modificaciones para su plan de suscripción de licencia.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Resumen del plan:</strong><br />- Plan solicitado: ${plan_name}<br />- Fecha efectiva: ${effective_date} (Nota: Si algun valor &quot;adicional&quot; es &lt; 0, este cambio entrara en vigor en la próxima Fecha de Renovación)<br /><strong>Desglose de capacidad:</strong> consulte el archivo PDF adjunto.<br /><strong>Informacion de contacto:</strong><br />- Solicitante: ${requester_name}, ${requester_email}<br />- Gerente de la propiedad/Propietario: ${manager_name}, ${manager_email}<br />- Contacto de facturación: ${contact_name}, ${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Por favor, genere la cotización correspondiente y envíela al contacto de facturación indicado anteriormente.</div>
</template>

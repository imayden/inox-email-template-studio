<template data-language="zh">
<!-- @subject INOX Smart 邀请注册 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">邀请注册</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">我们邀请您在 INOX Smart App 上注册账户。注册完成后，您将能够通过 INOX Smart 智能管理系统访问您房间/空间所在物业的相关内容。</p>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>邀请人：</strong> ${inviterName}(${email})<br /><strong>物业：</strong> ${propertyName}<br /><strong>注册链接：</strong> ${link}<br /><strong>链接有效期：</strong> ${startTime} &mdash; ${endTime}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">重要提示：此注册链接将在 72 小时后失效。如果您无法在此时间范围内完成注册，请联系向您发送此邀请的人。如果这不是您的邮箱，请忽略此邮件。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Invite to Register -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Invite to register</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">We invite you to register an account on the INOX Smart App. Once registered, you will be able to access the property of your room/space through the INOX Smart intelligent management system.</p>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Inviter:</strong> ${inviterName}(${email})<br /><strong>Property:</strong> ${propertyName}<br /><strong>Registration Link:</strong> ${link}<br /><strong>Link validity period:</strong> ${startTime} &mdash; ${endTime}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Important: This registration link expires in 72 hours. If you are unable to complete your registration within this timeframe, please contact the person who sent you this invitation. If this is not your email, please ignore it.</p>
</template>

<template data-language="es">
<!-- @subject INOX Smart Invitación para registrarte -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Invitación para registrarte</h1>
          <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
          <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Te invitamos a registrar una cuenta en la app INOX Smart. Una vez registrado, podrás acceder a la propiedad de tu espacio a través del sistema inteligente de gestión INOX Smart.</p>
          <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Invitador:</strong> ${inviterName}(${email})<br /><strong>Propiedad:</strong> ${propertyName}<br /><strong>Enlace de registro:</strong> ${link}<br /><strong>Periodo de validez del enlace:</strong> ${startTime} &mdash; ${endTime}</p>
          <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
          <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Importante: este enlace de registro vence en 72 horas. Si no puedes completar tu registro dentro de este plazo, ponte en contacto con la persona que te envió esta invitación. Si este correo no es para ti, ignóralo.</p>
</template>

<template data-language="zh">
<!-- @subject INOX Smart 入住邀请 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">您收到一份入住邀请</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您受邀入住以下单元：</p>
              <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
              <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
              <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>邀请人：</strong> ${inviterName}(${email})<br /><strong>物业：</strong> ${propertyName}<br /><strong>单元：</strong> ${unitName}<br /><strong>验证码有效期：</strong> ${startTime} &mdash; ${endTime}</p>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">如需接受邀请，请登录 INOX Smart App 并在 48 小时内输入此验证码。如果您不是此邮件的预期收件人，请忽略此邮件。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Move-In Invitation -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">You’ve received a move-in invitation</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">You have been invited to move into the following unit(s):</p>
              <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
              <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
              <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Inviter:</strong> ${inviterName}(${email})<br /><strong>Property:</strong> ${propertyName}<br /><strong>Unit(s):</strong> ${unitName}<br /><strong>Code validity period:</strong> ${startTime} &mdash; ${endTime}</p>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">To accept, log in to the INOX Smart App and enter this code within 48 hours. If you are not the intended recipient of this email, please disregard it.</p>
</template>

<template data-language="es">
<!-- @subject INOX Smart Invitación para mudarte -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Has recibido una invitación para mudarte</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">Has recibido una invitación para mudarte a la unidad o las unidades indicadas a continuación:</p>
              <table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 70px; background-color:#80C41C; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${code}</span></td></tr></table>
              <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
              <p style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Invitador:</strong> ${inviterName}(${email})<br /><strong>Propiedad:</strong> ${propertyName}<br /><strong>Unidad(es):</strong> ${unitName}<br /><strong>Periodo de validez del código:</strong> ${startTime} &mdash; ${endTime}</p>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Para aceptar, inicia sesión en la app INOX Smart e ingresa este código en un plazo de 48 horas. Si no eres la persona destinataria de este correo, ignóralo.</p>
</template>

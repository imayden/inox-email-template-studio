<template data-language="zh">
<!-- @subject INOX Smart 许可证自动续订通知 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">许可证已安排自动续订</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>自动续订摘要</strong><br />您的许可证订阅已安排在下方所示日期自动续订。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>续订详情：</strong><br />- 许可证计划：${plan_name}<br />- 续订日期：${effective_date}<br /><strong>续订时的容量：</strong><br />- 设备：${current_device_num}<br />- 活跃用户：${current_active_user_num}<br />- E-key：${current_ekey_num}<br />- SaaS 登录数：${current_saas_login_num}<br />- 物业：${current_property_num}<br /><strong>账户信息：</strong><br />- 物业经理/业主：${manager_name}，<a href="mailto:${manager_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${manager_email}</a><br />- 账单联系人：${contact_name}，<a href="mailto:${contact_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${contact_email}</a></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">如果这些信息准确无误，则无需采取进一步行动。如需修改，请在续订日期前联系您的 INOX Smart 合作伙伴。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart License Auto-Renewal Notice -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">License auto-renewal scheduled</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>Auto-Renewal Summary</strong><br />Your license subscription is scheduled to renew automatically on the date shown below.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Renewal Details:</strong><br />- License Plan: ${plan_name}<br />- Renewal Date: ${effective_date}<br /><strong>Capacity at Renewal:</strong><br />- Devices: ${current_device_num}<br />- Active Users: ${current_active_user_num}<br />- E-Keys: ${current_ekey_num}<br />- SaaS Logins: ${current_saas_login_num}<br />- Properties: ${current_property_num}<br /><strong>Account Information:</strong><br />- Property Manager/Owner: ${manager_name}, <a href="mailto:${manager_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${manager_email}</a><br />- Billing Contact: ${contact_name}, <a href="mailto:${contact_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${contact_email}</a></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">No further action is required if these details are correct. If you need to make changes, contact your INOX Smart partner before the renewal date.</div>
</template>

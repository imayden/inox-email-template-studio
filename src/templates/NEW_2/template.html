<template data-language="zh">
<!-- @subject INOX Smart 许可证自动续订通知 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">许可证自动续订通知</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>订阅自动续订摘要</strong><br />此为确认函，证明您的许可证订阅已安排自动续订。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>续订详情：</strong><br />- 许可计划：${plan_name}<br />- 生效日期（续期日期）：${effective_date}<br /><strong>更新能力：</strong><br />- 设备：${current_device_num}<br />- 活跃用户：${current_active_user_num}<br />- 电子钥匙：${current_ekey_num}<br />- SaaS 登录数：${current_saas_login_num}<br />- 物业：${current_property_num}<br /><strong>账户信息：</strong><br />- 物业经理/业主：${manager_name}，${manager_email}<br />- 账单联系人：${contact_name}，${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">如果这些信息准确无误，则无需采取进一步行动。如需修改，请在生效日期前联系您的合作伙伴。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart Subscription Auto-Renewal Summary -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">License Auto-Renewal Notice</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>Subscription Auto-Renewal Summary</strong><br />This is a confirmation that your license subscription is scheduled for auto-renewal.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Renewal Details:</strong><br />- License Plan: ${plan_name}<br />- Effective Date (Renewal Date): ${effective_date}<br /><strong>Renewing Capacity:</strong><br />- Devices: ${current_device_num}<br />- Active Users: ${current_active_user_num}<br />- E-Keys: ${current_ekey_num}<br />- SaaS Logins: ${current_saas_login_num}<br />- Properties: ${current_property_num}<br /><strong>Account Information:</strong><br />- Property Manager/Owner: ${manager_name}, ${manager_email}<br />- Billing Contact: ${contact_name}, ${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">No further action is required if these details are correct. For modifications, please contact your partner before the effective date.</div>
</template>

              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;"><strong>Resumen de renovación automática de suscripción</strong><br />Esta es una confirmación de que la suscripción de su licencia está programada para renovarse automáticamente.</div>

              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">No se requiere ninguna acción adicional si estos detalles son correctos. Para modificaciones, póngase en contacto con su socio antes de la fecha efectiva.</div>

<template data-language="zh">
<!-- @subject INOX Smart ID 丢失/被盗告警 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">ID丢失/被盗告警</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">系统检测到有挂失卡正在被使用。以下是该挂失卡的信息。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>RFID 所有人：</strong> ${cardOwner}(${email})<br /><strong>RFID 名称：</strong> ${cardName}<br /><strong>RFID ID：</strong> ${cardID}<br /><strong>报告时间：</strong> ${lostTime}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请立即核查此活动。<br />如果这封邮件并非发给您，请忽略。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart Lost/Stolen ID Card Alert -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Lost/Stolen ID Card</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">The system has detected that a lost card is being used. The following is the information about the lost card.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>RFID owner:</strong> ${cardOwner}(${email})<br /><strong>RFID name:</strong> ${cardName}<br /><strong>RFID ID:</strong> ${cardID}<br /><strong>Reported Time:</strong> ${lostTime}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please verify this activity immediately.<br />If this email is not intended for you, please disregard.</div>
</template>

<template data-language="es">
<!-- @subject INOX Smart Alerta de tarjeta de identificación perdida o robada -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Tarjeta de identificación perdida o robada</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">El sistema ha detectado que se esta utilizando una tarjeta reportada como perdida. A continuacion se muestra la informacion de la tarjeta perdida.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Propietario RFID:</strong> ${cardOwner}(${email})<br /><strong>Nombre RFID:</strong> ${cardName}<br /><strong>ID RFID:</strong> ${cardID}<br /><strong>Fecha y hora del reporte:</strong> ${lostTime}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Verifica esta actividad de inmediato.<br />Si este correo no es para ti, ignóralo.</div>
</template>

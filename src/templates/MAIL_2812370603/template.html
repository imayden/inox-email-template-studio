<template data-language="zh">
<!-- @subject INOX Smart 丢失/被盗 ID 使用告警 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">检测到丢失/被盗 ID</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">系统检测到有人尝试使用已报告为丢失或被盗的 ID，详情如下。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>RFID 所有人：</strong> ${cardOwner}(<a href="mailto:${email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${email}</a>)<br /><strong>RFID 名称：</strong> ${cardName}<br /><strong>RFID ID：</strong> ${cardID}<br /><strong>报告时间：</strong> ${lostTime}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">请立即核查此活动。<br />如果您不是此邮件的预期收件人，请忽略此邮件。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart Lost/Stolen ID Use Alert -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Lost/Stolen ID detected</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">The system detected an attempt to use an ID reported as lost or stolen. Details are shown below.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>RFID owner:</strong> ${cardOwner}(<a href="mailto:${email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${email}</a>)<br /><strong>RFID name:</strong> ${cardName}<br /><strong>RFID ID:</strong> ${cardID}<br /><strong>Reported Time:</strong> ${lostTime}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Please investigate this activity immediately.<br />If you are not the intended recipient of this email, please disregard it.</div>
</template>

<template data-language="es">
<!-- @subject INOX Smart Alerta de uso de ID perdido/robado -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Se detectó un ID perdido/robado</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">El sistema detectó un intento de uso de un ID reportado como perdido o robado. Los detalles se muestran a continuación.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Propietario RFID:</strong> ${cardOwner}(<a href="mailto:${email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${email}</a>)<br /><strong>Nombre RFID:</strong> ${cardName}<br /><strong>ID RFID:</strong> ${cardID}<br /><strong>Fecha y hora del reporte:</strong> ${lostTime}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Investiga esta actividad de inmediato.<br />Si no eres la persona destinataria de este correo, ignóralo.</div>
</template>

<template data-language="zh">
<!-- @subject INOX Smart 访问码已创建 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">访问码已创建！</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">我们已为您创建一个自定义访问密码，可用于开启 INOX Smart 密码锁。</p>
              <table border="0" cellspacing="0" cellpadding="0" width="100%">
                <tr>
                  <td align="center">
                    <span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span>
                  </td>
                </tr>
              </table>
              <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
              <p style="margin:0; font-size:14px; line-height:1.8;">
                <strong>创建人：</strong> ${inviterName}(${email})<br />
                <strong>物业：</strong> ${propertyName}<br />
                <strong>可访问单元和设备：</strong> ${unitName}(${deviceName})
              </p>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">请在上述访问时段内于门锁键盘输入此密码。此密码由发送者创建。如需删除或更新您的密码，请通知发送者或管理员。<br />如果这不是您的邮箱，请忽略此邮件。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Access Code Created -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Access code created!</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">We have created a custom access password for you to unlock the INOX Smart keypad lock.</p>
              <table border="0" cellspacing="0" cellpadding="0" width="100%">
                <tr>
                  <td align="center">
                    <span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span>
                  </td>
                </tr>
              </table>
              <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
              <p style="margin:0; font-size:14px; line-height:1.8;">
                <strong>Created By:</strong> ${inviterName}(${email})<br />
                <strong>Property:</strong> ${propertyName}<br />
                <strong>Accessible Units &amp; Devices:</strong> ${unitName}(${deviceName})
              </p>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">Use this code on the keypad at the door during the access window above. This code is created by the sender. If you need to delete or update your password, please notify the sender or administrator.<br />If this is not your email, please ignore it.</p>
</template>

<template data-language="es">
<!-- @subject INOX Smart Código de acceso creado -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">¡Código de acceso creado!</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">Hemos creado una contraseña de acceso personalizada para que puedas desbloquear la cerradura con teclado INOX Smart.</p>
              <table border="0" cellspacing="0" cellpadding="0" width="100%">
                <tr>
                  <td align="center">
                    <span style="display:inline-block; padding:10px 70px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span>
                  </td>
                </tr>
              </table>
              <div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div>
              <p style="margin:0; font-size:14px; line-height:1.8;">
                <strong>Creado por:</strong> ${inviterName}(${email})<br />
                <strong>Propiedad:</strong> ${propertyName}<br />
                <strong>Unidades y dispositivos accesibles:</strong> ${unitName}(${deviceName})
              </p>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">Usa este código en el teclado de la puerta durante la ventana de acceso indicada arriba. Este código fue creado por el remitente. Si necesitas eliminar o actualizar tu contraseña, notifícalo al remitente o al administrador.<br />Si este correo no es para ti, ignóralo.</p>
</template>

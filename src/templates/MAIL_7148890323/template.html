<template data-language="zh">
<!-- @subject INOX Smart 未关门告警 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">未关门告警</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">${unitFullName} 的门已持续开启超过 ${time}，请及时检查并确认门已关闭。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">如需更多详情或帮助，请访问 inoxsmart.com/support。感谢您使用 INOX Smart！<br />如果这封邮件并非发给您，请忽略。</div>
</template>

<template data-language="en">
<!-- @subject INOX Smart Door Open Alert -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Door Open Alert</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">${unitFullName} door remains open for more than ${time}, please check promptly and make sure the door is closed.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">For more details or assistance, please visit inoxsmart.com/support. Thanks for using INOX Smart!<br />If this email is not intended for you, please disregard.</div>
</template>

<template data-language="es">
<!-- @subject INOX Smart Alerta de puerta abierta -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">Alerta de puerta abierta</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hola, ${userName}:</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">La puerta de ${unitFullName} permanece abierta durante más de ${time}. Revise cuanto antes y asegurese de que la puerta quede cerrada.</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">Para más detalles o ayuda, visita inoxsmart.com/support. Gracias por usar INOX Smart.<br />Si este correo no es para ti, ignóralo.</div>
</template>

<template data-language="zh">
<!-- @subject INOX Smart 门长时间未关闭告警 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">门长时间未关闭</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">${unitFullName} 的门已持续开启超过 ${time}。请立即检查并确认门已完全关闭。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">如需更多详情或帮助，请访问 <a href="https://inoxsmart.com/support" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">inoxsmart.com/support</a>。感谢您使用 INOX Smart！<br />如果您不是此邮件的预期收件人，请忽略此邮件。</div>
</template>

</template>

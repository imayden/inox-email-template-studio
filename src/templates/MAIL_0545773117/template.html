<template data-language="zh">
<!-- @subject INOX Smart 访问码已创建 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">访问码已创建！</h1><p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${userName}，您好：</strong></p><p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">系统已为您创建一个一次性访问码，可用于开启 INOX Smart 键盘锁。</p><table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 14px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span></td></tr></table><div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div><p style="margin:0; font-size:14px; line-height:1.8;"><strong>创建人：</strong> ${inviterName}(${email})<br /><strong>物业：</strong> ${propertyName}<br /><strong>可访问单元和设备：</strong> ${unitName}(${deviceName})<br /><strong>有效时段：</strong> ${startTime} &mdash; ${endTime}</p><div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div><p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">请在上述时段内于门锁键盘输入此访问码。此访问码为<strong>一次性使用</strong>，使用后或超过有效时段后可能失效。请勿将此访问码分享给他人。<br />如果这不是您的邮箱，请忽略此邮件。</p>
</template>

<template data-language="en">
<!-- @subject INOX Smart Access Code Created -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#7fc344; font-weight:bold;">Access code created!</h1><p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${userName},</strong></p><p style="margin:0 0 20px 0; font-size:14px; line-height:1.6;">A one-time access code has been created for you to unlock an INOX Smart keypad lock.</p><table border="0" cellspacing="0" cellpadding="0" width="100%"><tr><td align="center"><span style="display:inline-block; padding:10px 14px; background-color:#7fc344; color:#ffffff; font-size:32px; font-weight:bold; letter-spacing:2px; font-family:Arial, sans-serif;">${password}</span></td></tr></table><div style="height:30px; line-height:30px; font-size:0;">&nbsp;</div><p style="margin:0; font-size:14px; line-height:1.8;"><strong>Created By:</strong> ${inviterName}(${email})<br /><strong>Property:</strong> ${propertyName}<br /><strong>Accessible Units &amp; Devices:</strong> ${unitName}(${deviceName})<br /><strong>Schedule:</strong> ${startTime} &mdash; ${endTime}</p><div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div><p style="margin:0 0 22px 0; font-size:14px; line-height:1.6;">Use this code on the keypad at the door during the access window above. This code is <strong>one-time use</strong> and may not work again after it has been used or after the access window expires. Please do not share this code.<br />If this is not your email, please ignore it.</p>
</template>

<template data-language="es">

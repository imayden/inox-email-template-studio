<template data-language="zh">
<!-- @subject INOX Smart 许可证过期通知 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">许可证过期通知</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${property_manager_name}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您的 INOX Smart SaaS License 已过期，且系统尚未收到更新后的续费授权。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>已过期 License 详情：</strong><br />- License 套餐：${license_type}<br />- 到期日期：${license_expire_date}<br />- 物业经理：${manager_name}，${manager_email}<br />- 账单联系人：${contact_name}，${contact_email}</div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">因此，您的 SaaS License 已被暂停。<br />如需恢复访问，请联系您的 Partner 完成续费，并更新 License 授权。<br /><br />Best,<br />INOX Smart Team</div>
</template>

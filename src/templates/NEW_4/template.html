<template data-language="zh">
<!-- @subject INOX Smart 许可证已过期 -->
<h1 style="margin:0 0 24px 0; font-size:32px; line-height:1.2; color:#80C41C; font-weight:bold;">您的许可证已过期</h1>
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>${property_manager_name}，您好：</strong></p>
              <div style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333333;">您的 INOX Smart SaaS 许可证已过期，我们尚未收到续订授权。</div>
              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>已过期许可证详情：</strong><br />- 许可证计划：${license_type}<br />- 到期日期：${license_expire_date}<br />- 物业经理：${manager_name}，<a href="mailto:${manager_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${manager_email}</a><br />- 账单联系人：${contact_name}，<a href="mailto:${contact_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${contact_email}</a></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">因此，您的 INOX Smart SaaS 访问权限已被暂停。<br />如需恢复访问，请联系您的 INOX Smart 合作伙伴完成续订。<br /><br />此致，<br />INOX Smart 团队</div>
</template>

<template data-language="en">

              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.5;"><strong>Hello ${property_manager_name},</strong></p>

              <div style="margin:0; font-size:14px; line-height:1.8; color:#333333;"><strong>Expired License Details:</strong><br />- License Plan: ${license_type}<br />- Expiration Date: ${license_expire_date}<br />- Property Manager: ${manager_name}, <a href="mailto:${manager_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${manager_email}</a><br />- Billing Contact: ${contact_name}, <a href="mailto:${contact_email}" target="_blank" rel="noopener noreferrer" style="color:#80C41C; text-decoration:underline;">${contact_email}</a></div>
              <div style="height:26px; line-height:26px; font-size:0;">&nbsp;</div>
              <div style="margin:0 0 22px 0; font-size:14px; line-height:1.7; color:#333333;">As a result, access to INOX Smart SaaS has been suspended.<br />To restore access, contact your INOX Smart partner to renew the license.<br /><br />Best,<br />INOX Smart Team</div>
</template>
